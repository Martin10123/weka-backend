spring.application.name=weka
cerebras.api-key=${CEREBRAS_API_KEY:}
cerebras.base-url=https://api.cerebras.ai/v1
cerebras.model=llama3.1-8b

# Multipart upload limits (increase if you upload large CSV/ARFF files)
# Example: 100MB max file size and request size
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Tomcat specific: allow larger POST bodies if necessary (use -1 for unlimited)
server.tomcat.max-swallow-size=100MB
